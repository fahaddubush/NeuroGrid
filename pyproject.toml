[tool.ruff]
target-version = "py311"
line-length = 100
exclude = ["src/proto", "vendor", "artifacts", "data", "scratch"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
norecursedirs = ["scratch", ".claude", ".git", ".venv", "artifacts", "data"]
